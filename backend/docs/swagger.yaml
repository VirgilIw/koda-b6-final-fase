definitions:
  dto.AuthRegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.AuthRegisterResponse:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register user
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AuthRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
      summary: Register user
      tags:
      - Authentication
securityDefinitions:
  BearerAuth:
    description: 'Masukkan token dengan format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
