definitions:
  dto.AuthLoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.AuthLoginResponse:
    properties:
      error:
        type: string
      message:
        type: string
      result:
        $ref: '#/definitions/dto.LoginAllData'
      success:
        type: boolean
    type: object
  dto.AuthRegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.AuthRegisterResponse:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.LinksResponse:
    properties:
      error:
        type: string
      message:
        type: string
      result: {}
      success:
        type: boolean
    type: object
  dto.LoginAllData:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserData'
    type: object
  dto.ShortLinksRequest:
    properties:
      original_url:
        type: string
      slug:
        type: string
    required:
    - original_url
    type: object
  dto.UserData:
    properties:
      email:
        type: string
      id:
        type: integer
    type: object
  dto.UserResponse:
    properties:
      error:
        type: string
      message:
        type: string
      result: {}
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /api/email/{email}:
    get:
      consumes:
      - application/json
      description: Get user data based on email
      parameters:
      - description: User Email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.UserResponse'
      summary: Get user by email
      tags:
      - Users
  /api/links:
    get:
      description: Get paginated short links for authenticated user
      parameters:
      - description: Page number
        example: 1
        in: query
        name: page
        type: integer
      - description: Number of items per page
        example: 4
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of short links
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.LinksResponse'
      security:
      - BearerAuth: []
      summary: Get all short links
      tags:
      - Links
    post:
      consumes:
      - application/json
      description: Create a short URL from original URL (optionally with custom slug)
      parameters:
      - description: Original URL and optional custom slug
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ShortLinksRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.LinksResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.LinksResponse'
      security:
      - BearerAuth: []
      summary: Create short link
      tags:
      - Links
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.AuthLoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.AuthLoginResponse'
      summary: Login user
      tags:
      - Authentication
  /api/register:
    post:
      consumes:
      - application/json
      description: Register user
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AuthRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.AuthRegisterResponse'
      summary: Register user
      tags:
      - Authentication
  /r/{slug}:
    get:
      description: Redirect user to the original URL using slug
      parameters:
      - description: Short link slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "302":
          description: Redirect to original URL
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.LinksResponse'
      summary: Redirect to original URL
      tags:
      - Links
securityDefinitions:
  BearerAuth:
    description: 'Masukkan token dengan format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
